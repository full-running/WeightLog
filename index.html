<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeightLog</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/utils.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/bmi.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>

  <header>
    <h1>⚖️ WeightLog</h1>
    <div id="height-wrap">
      <label for="height-input">키 (cm)</label>
      <input type="number" id="height-input" placeholder="170">
      <button id="height-save-btn">저장</button>
    </div>
  </header>

  <main>

    <section id="form-section">
      <input type="date" id="date-input">
      <input type="number" id="weight-input" placeholder="kg">
      <button id="weight-save-btn">기록 추가</button>
    </section>

    <section id="list-section">
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>체중 (kg)</th>
            <th>BMI</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="weight-list">
          <!-- render.js가 동적으로 채움 -->
        </tbody>
      </table>
    </section>

  </main>

</body>
</html>
