<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeightLog</title>

    <!-- 스타일 -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />

    <!-- JS 모듈 로드 순서: utils → storage → bmi → render → app -->
    <script src="js/utils.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/bmi.js" defer></script>
    <script src="js/render.js" defer></script>
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <!-- 첫 방문 시 노출 / LocalStorage에 기본정보 없으면 표시 -->
    <section id="setup-section">
      <h1>⚖️ WeightLog</h1>
      <h2>기본 정보 입력</h2>

      <!-- 성별 선택 -->
      <div>
        <label>성별</label>
        <label><input type="radio" name="gender" value="male" /> 남성</label>
        <label><input type="radio" name="gender" value="female" /> 여성</label>
      </div>

      <!-- 키 입력 (BMI 계산에 사용) -->
      <div>
        <label for="height-input">키 (cm)</label>
        <input type="number" id="height-input" placeholder="170" />
      </div>

      <!-- 쿠키 동의 선택 -->
      <div id="consent-wrap">
        <p>기본 정보를 저장하는 방식을 선택해주세요.</p>
        <label>
          <input type="radio" name="consent" value="cookie" />
          쿠키에 저장 (브라우저를 닫아도 유지)
        </label>
        <label>
          <input type="radio" name="consent" value="session" />
          세션에 저장 (브라우저를 닫으면 삭제)
        </label>
      </div>

      <button id="setup-save-btn">시작하기</button>
    </section>

    <!-- 재방문 or 기본정보 저장 후 노출 -->
    <main id="main-section">
      <header>
        <h1>⚖️ WeightLog</h1>
      </header>

      <!-- 날짜 + 체중 입력 폼 -->
      <section id="form-section">
        <input type="date" id="date-input" />
        <input type="number" id="weight-input" placeholder="kg" />
        <button id="weight-save-btn">기록 추가</button>
      </section>

      <!-- 기록 목록 / render.js가 tbody를 동적으로 채움 -->
      <section id="list-section">
        <table>
          <thead>
            <tr>
              <th>날짜</th>
              <th>체중 (kg)</th>
              <th>BMI</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="weight-list"></tbody>
        </table>
      </section>
    </main>
  </body>
</html>
